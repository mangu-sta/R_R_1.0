services:
  mariadb:
    image: mariadb:11.4
    container_name: rr-mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: rr
      MARIADB_USER: RR
      MARIADB_PASSWORD: 1234
    ports:
      - "3307:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: rr-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mariadb_data:
  redis_data:
